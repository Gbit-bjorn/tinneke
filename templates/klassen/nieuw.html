{% extends "base.html" %}

{% block title %}Nieuwe klas aanmaken{% endblock %}

{% block content %}

<!-- Breadcrumb -->
<nav class="flex items-center gap-2 text-sm font-body text-slate-400 mb-6">
    <a href="{{ url_for('klassen.dashboard') }}" class="hover:text-primary transition-colors">Dashboard</a>
    <span>/</span>
    <span class="text-ink font-500">Nieuwe klas</span>
</nav>

<div class="max-w-lg">

    <div class="mb-7">
        <h1 class="font-heading text-3xl font-700 text-ink">Nieuwe klas aanmaken</h1>
        <p class="mt-1 text-base font-body text-slate-500">
            Vul de gegevens in. Leerlingen kan je achteraf importeren via CSV.
        </p>
    </div>

    <form method="POST" action="{{ url_for('klassen.nieuw') }}" novalidate>
        <div class="clay-card p-6 flex flex-col gap-5">

            <!-- Klasnaam -->
            <div>
                <label for="naam" class="clay-label">
                    Klasnaam <span class="text-danger">*</span>
                </label>
                <input
                    type="text"
                    id="naam"
                    name="naam"
                    class="clay-input"
                    placeholder="bijv. 3A, 5 Handel, 2 Bouw"
                    required
                    autofocus
                    value="{{ request.form.get('naam', '') }}"
                />
            </div>

            <!-- Richting / studierichting -->
            <div>
                <label for="richting" class="clay-label">Studierichting</label>
                <input
                    type="text"
                    id="richting"
                    name="richting"
                    class="clay-input"
                    placeholder="bijv. Handel & Administratie, Bouwtechnieken"
                    value="{{ request.form.get('richting', '') }}"
                />
            </div>

            <!-- Schooljaar -->
            <div>
                <label for="schooljaar" class="clay-label">Schooljaar</label>
                <input
                    type="text"
                    id="schooljaar"
                    name="schooljaar"
                    class="clay-input"
                    placeholder="bijv. 2025-2026"
                    value="{{ request.form.get('schooljaar', '2025-2026') }}"
                />
            </div>

        </div>

        <!-- Actieknoppen -->
        <div class="flex gap-3 mt-5">
            <a href="{{ url_for('klassen.dashboard') }}" class="clay-btn clay-btn-ghost">
                Annuleer
            </a>
            <button type="submit" class="clay-btn clay-btn-cta">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                Klas aanmaken
            </button>
        </div>
    </form>
</div>

{% endblock %}
