<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inloggen — BK · DPK · LPD Attestering</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary:   '#2563EB',
                        secondary: '#3B82F6',
                        cta:       '#F97316',
                        surface:   '#FFFFFF',
                        bg:        '#F8FAFC',
                        ink:       '#1E293B',
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body:    ['Nunito', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #F8FAFC;
            color: #1E293B;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Zachte radiale achtergrond met schoolblauw accent */
            background-image:
                radial-gradient(ellipse 70% 50% at 20% 30%, rgba(59,130,246,0.10) 0%, transparent 60%),
                radial-gradient(ellipse 60% 60% at 80% 80%, rgba(249,115,22,0.07) 0%, transparent 60%);
        }
        h1, h2, h3 { font-family: 'Fredoka', sans-serif; }

        .clay-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow:
                8px 8px 20px rgba(37, 99, 235, 0.12),
                -3px -3px 8px rgba(255, 255, 255, 0.90),
                inset 0 1px 0 rgba(255, 255, 255, 0.95);
            border: 2px solid rgba(255, 255, 255, 0.70);
        }

        .clay-input {
            width: 100%;
            background: #F8FAFC;
            border-radius: 14px;
            border: 2px solid #E2E8F0;
            padding: 0.7rem 1rem;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            color: #1E293B;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            box-shadow: inset 2px 2px 5px rgba(37,99,235,0.06), inset -1px -1px 3px rgba(255,255,255,0.80);
        }
        .clay-input:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15), inset 2px 2px 5px rgba(37,99,235,0.06);
        }
        .clay-input::placeholder { color: #94A3B8; }

        .clay-btn-cta {
            width: 100%;
            background: linear-gradient(135deg, #FB923C, #F97316);
            color: #ffffff;
            border: none;
            border-radius: 14px;
            padding: 0.75rem 1.5rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease;
            box-shadow:
                4px 4px 10px rgba(249,115,22,0.30),
                -1px -1px 4px rgba(255,255,255,0.50),
                inset 0 1px 0 rgba(255,255,255,0.30);
        }
        .clay-btn-cta:hover  { transform: translateY(-2px); box-shadow: 5px 5px 16px rgba(249,115,22,0.40); }
        .clay-btn-cta:active { transform: translateY(0); }

        .error-box {
            background: #FEE2E2;
            border: 2px solid #FECACA;
            border-radius: 14px;
            padding: 0.75rem 1rem;
            color: #7F1D1D;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Decoratieve bolletjes */
        .deco-circle {
            position: fixed;
            border-radius: 50%;
            opacity: 0.4;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Achtergrond decoratie -->
    <div class="deco-circle w-64 h-64 -top-16 -left-16"
         style="background: radial-gradient(circle, rgba(59,130,246,0.18), transparent 70%);"></div>
    <div class="deco-circle w-48 h-48 bottom-12 right-8"
         style="background: radial-gradient(circle, rgba(249,115,22,0.15), transparent 70%);"></div>

    <!-- Login kaart -->
    <div class="clay-card w-full mx-4" style="max-width: 420px; padding: 2.5rem 2.5rem 2.25rem;">

        <!-- Logo & titel -->
        <div class="text-center mb-7">
            <!-- School embleem -->
            <div class="w-16 h-16 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-2xl font-bold shadow-lg"
                 style="background: linear-gradient(135deg, #3B82F6, #2563EB);
                        box-shadow: 4px 4px 12px rgba(37,99,235,0.30), -1px -1px 4px rgba(255,255,255,0.60);">
                D
            </div>
            <h1 class="font-heading text-2xl font-700 text-ink leading-tight">
                BK&thinsp;·&thinsp;DPK&thinsp;·&thinsp;LPD Attestering
            </h1>
            <p class="mt-1 text-sm font-body font-500 text-slate-500">
                Damiaaninstituut Aarschot
            </p>
        </div>

        <!-- Foutmelding -->
        {% if error %}
        <div class="error-box mb-5" role="alert">
            <span>⚠</span>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <!-- Login formulier -->
        <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
            <div class="mb-4">
                <label for="username" class="block text-sm font-body font-600 text-slate-500 mb-1.5">
                    Gebruikersnaam
                </label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    class="clay-input"
                    placeholder="jouw gebruikersnaam"
                    autocomplete="username"
                    autofocus
                    required
                />
            </div>

            <div class="mb-6">
                <label for="password" class="block text-sm font-body font-600 text-slate-500 mb-1.5">
                    Wachtwoord
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="clay-input"
                    placeholder="••••••••"
                    autocomplete="current-password"
                    required
                />
            </div>

            <button type="submit" class="clay-btn-cta">
                Inloggen
            </button>
        </form>

        <!-- Subtekst onderaan -->
        <p class="text-center text-xs font-body text-slate-400 mt-5">
            Enkel toegankelijk voor medewerkers van het Damiaaninstituut.
        </p>
    </div>

</body>
</html>
